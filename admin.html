<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>솔라패스 — 관리자 대시보드</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans KR', sans-serif; background: #F3F4F6; color: #111827; }

/* ── 로그인 게이트 ── */
#gate {
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
}
.gate-box {
  background: #fff;
  border-radius: 12px;
  padding: 48px 40px;
  width: 360px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.08);
  text-align: center;
}
.gate-box h1 { font-size: 1.3rem; font-weight: 700; color: #0F3D22; margin-bottom: 8px; }
.gate-box p  { font-size: 13px; color: #6B7280; margin-bottom: 28px; }
.gate-input {
  width: 100%; padding: 12px 16px;
  border: 1.5px solid #D1D5DB; border-radius: 6px;
  font-size: 15px; font-family: inherit;
  outline: none; margin-bottom: 14px;
  transition: border-color 0.15s;
}
.gate-input:focus { border-color: #2D9158; }
.gate-btn {
  width: 100%; padding: 13px;
  background: #0F3D22; color: #fff;
  border: none; border-radius: 6px;
  font-size: 15px; font-weight: 700; font-family: inherit;
  cursor: pointer; transition: background 0.15s;
}
.gate-btn:hover { background: #1A6B3A; }
.gate-error { color: #EA580C; font-size: 12px; margin-top: 10px; display: none; }

/* ── 대시보드 ── */
#dashboard { display: none; }

header {
  background: #0F3D22;
  padding: 18px 32px;
  display: flex; align-items: center; justify-content: space-between;
}
header h1 { color: #F5A623; font-size: 1.1rem; font-weight: 700; }
header span { color: rgba(255,255,255,0.5); font-size: 13px; }

.main { max-width: 1100px; margin: 32px auto; padding: 0 24px; }

/* ── 요약 카드 ── */
.summary {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 16px;
  margin-bottom: 32px;
}
.card {
  background: #fff;
  border-radius: 10px;
  padding: 24px;
  box-shadow: 0 1px 6px rgba(0,0,0,0.06);
}
.card-label { font-size: 12px; font-weight: 700; color: #6B7280; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 8px; }
.card-num { font-size: 2rem; font-weight: 700; color: #0F3D22; line-height: 1; }
.card-sub { font-size: 12px; color: #9CA3AF; margin-top: 6px; }

/* ── 툴바 ── */
.toolbar {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px; gap: 12px; flex-wrap: wrap;
}
.search-input {
  padding: 9px 14px; border: 1.5px solid #D1D5DB; border-radius: 6px;
  font-size: 14px; font-family: inherit; outline: none;
  width: 260px; transition: border-color 0.15s;
}
.search-input:focus { border-color: #2D9158; }
.btn-csv {
  padding: 9px 20px; background: #F5A623; color: #0F3D22;
  border: none; border-radius: 6px; font-size: 13px; font-weight: 700;
  font-family: inherit; cursor: pointer; transition: background 0.15s;
  white-space: nowrap;
}
.btn-csv:hover { background: #D4851A; }
.btn-refresh {
  padding: 9px 16px; background: #fff; color: #0F3D22;
  border: 1.5px solid #D1D5DB; border-radius: 6px; font-size: 13px;
  font-family: inherit; cursor: pointer; transition: all 0.15s;
}
.btn-refresh:hover { border-color: #2D9158; }

/* ── 테이블 ── */
.table-wrap {
  background: #fff;
  border-radius: 10px;
  box-shadow: 0 1px 6px rgba(0,0,0,0.06);
  overflow: hidden;
}
table { width: 100%; border-collapse: collapse; }
thead { background: #F9FAFB; }
th {
  padding: 12px 16px; text-align: left;
  font-size: 11px; font-weight: 700; color: #6B7280;
  letter-spacing: 0.08em; text-transform: uppercase;
  border-bottom: 1px solid #E5E7EB;
}
td {
  padding: 14px 16px; font-size: 13px;
  border-bottom: 1px solid #F3F4F6;
  vertical-align: top;
  max-width: 240px;
}
tr:last-child td { border-bottom: none; }
tr:hover td { background: #F9FAFB; }

.tag {
  display: inline-block;
  background: #EBF7EF; color: #1A6B3A;
  border: 1px solid rgba(26,107,58,0.25);
  border-radius: 4px; padding: 2px 8px;
  font-size: 11px; font-weight: 500;
  margin: 2px 2px 2px 0;
  white-space: nowrap;
}
.tag-map  { background: #FEF9EC; color: #D4851A; border-color: rgba(212,133,26,0.25); }
.tag-multi{ background: #EEF2FF; color: #4338CA; border-color: rgba(67,56,202,0.25); }
.tag-nation { background: #FDF2F8; color: #9D174D; border-color: rgba(157,23,77,0.2); }
.tag-direct { background: #F0FDF4; color: #15803D; border-color: rgba(21,128,61,0.25); }

.pain-text {
  color: #374151; line-height: 1.5;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden;
}
.date-text { color: #9CA3AF; white-space: nowrap; }

.empty {
  text-align: center; padding: 64px 24px;
  color: #9CA3AF; font-size: 14px;
}
.loading { text-align: center; padding: 48px; color: #9CA3AF; font-size: 14px; }
</style>
</head>
<body>

<!-- ── 로그인 게이트 ── -->
<div id="gate">
  <div class="gate-box">
    <h1>🌱 솔라패스 관리자</h1>
    <p>신청자 현황을 확인합니다</p>
    <input class="gate-input" type="password" id="pw-input" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter')checkPw()">
    <button class="gate-btn" onclick="checkPw()">확인</button>
    <div class="gate-error" id="pw-error">비밀번호가 올바르지 않습니다</div>
  </div>
</div>

<!-- ── 대시보드 ── -->
<div id="dashboard">
  <header>
    <h1>솔라패스 — 관리자 대시보드</h1>
    <span id="last-updated"></span>
  </header>

  <div class="main">
    <!-- 요약 -->
    <div class="summary">
      <div class="card">
        <div class="card-label">총 신청자</div>
        <div class="card-num" id="total-count">—</div>
        <div class="card-sub">누적 사전 신청</div>
      </div>
      <div class="card">
        <div class="card-label">오늘 신청</div>
        <div class="card-num" id="today-count">—</div>
        <div class="card-sub" id="today-date">—</div>
      </div>
      <div class="card">
        <div class="card-label">관심 항목 1위</div>
        <div class="card-num" id="top-interest" style="font-size:1.1rem; margin-top:4px;">—</div>
        <div class="card-sub">가장 많이 선택된 관심</div>
      </div>
      <div class="card">
        <div class="card-label">페인 포인트 작성률</div>
        <div class="card-num" id="pain-rate">—</div>
        <div class="card-sub">의견 남긴 신청자 비율</div>
      </div>
    </div>

    <!-- 툴바 -->
    <div class="toolbar">
      <input class="search-input" type="text" id="search" placeholder="이름 · 이메일 · 전화번호 검색" oninput="renderTable()">
      <div style="display:flex;gap:8px;">
        <button class="btn-refresh" onclick="loadData()">↻ 새로고침</button>
        <button class="btn-csv" onclick="exportCSV()">CSV 다운로드</button>
      </div>
    </div>

    <!-- 테이블 -->
    <div class="table-wrap">
      <div class="loading" id="loading">데이터 불러오는 중...</div>
      <table id="table" style="display:none;">
        <thead>
          <tr>
            <th>#</th>
            <th>이름</th>
            <th>이메일</th>
            <th>전화번호</th>
            <th>관심 항목</th>
            <th>불편 사항</th>
            <th>신청일시</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
      <div class="empty" id="empty" style="display:none;">신청자가 없습니다</div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const ADMIN_PW = 'solar2026';

const { createClient } = supabase;
const db = createClient(
  'https://iuvqwfthimenieqxalqj.supabase.co',
  'sb_publishable_5rcMOgpB_BRrw-R3-6Jlkw_GcSeCL_5'
);

const INTEREST_LABELS = {
  site_searching: '🔍 부지 탐색 중',
  multi_project:  '📦 복수 프로젝트',
  nationwide:     '🗺️ 전국 확장',
  direct:         '🏗️ 직접 부지 확보',
};
const INTEREST_CLASS = {
  site_searching: '',
  multi_project:  'tag-multi',
  nationwide:     'tag-nation',
  direct:         'tag-direct',
};

let allData = [];

function checkPw() {
  const val = document.getElementById('pw-input').value;
  if (val === ADMIN_PW) {
    document.getElementById('gate').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    loadData();
  } else {
    document.getElementById('pw-error').style.display = 'block';
  }
}

async function loadData() {
  document.getElementById('loading').style.display = 'block';
  document.getElementById('table').style.display = 'none';
  document.getElementById('empty').style.display = 'none';

  const { data, error } = await db
    .from('signups')
    .select('*')
    .order('created_at', { ascending: false });

  if (error || !data) {
    document.getElementById('loading').textContent = '데이터를 불러오지 못했습니다.';
    return;
  }

  allData = data;
  updateSummary(data);
  renderTable();

  const now = new Date();
  document.getElementById('last-updated').textContent =
    '최종 업데이트: ' + now.toLocaleTimeString('ko-KR');
}

function updateSummary(data) {
  const total = data.length;
  document.getElementById('total-count').textContent = total;

  const today = new Date().toISOString().slice(0, 10);
  const todayCount = data.filter(r => r.created_at.slice(0, 10) === today).length;
  document.getElementById('today-count').textContent = todayCount;
  document.getElementById('today-date').textContent = today;

  const freq = {};
  data.forEach(r => (r.interests || []).forEach(i => { freq[i] = (freq[i] || 0) + 1; }));
  const top = Object.entries(freq).sort((a, b) => b[1] - a[1])[0];
  document.getElementById('top-interest').textContent =
    top ? INTEREST_LABELS[top[0]] + ' (' + top[1] + '명)' : '—';

  const painCount = data.filter(r => r.pain && r.pain.trim()).length;
  document.getElementById('pain-rate').textContent =
    total ? Math.round(painCount / total * 100) + '%' : '—';
}

function renderTable() {
  const q = document.getElementById('search').value.toLowerCase();
  const rows = allData.filter(r =>
    !q ||
    (r.name  || '').toLowerCase().includes(q) ||
    (r.email || '').toLowerCase().includes(q) ||
    (r.phone || '').toLowerCase().includes(q)
  );

  document.getElementById('loading').style.display = 'none';

  if (rows.length === 0) {
    document.getElementById('table').style.display = 'none';
    document.getElementById('empty').style.display = 'block';
    return;
  }

  document.getElementById('table').style.display = 'table';
  document.getElementById('empty').style.display = 'none';

  const tbody = document.getElementById('tbody');
  tbody.innerHTML = rows.map((r, i) => {
    const tags = (r.interests || []).map(k =>
      `<span class="tag ${INTEREST_CLASS[k] || ''}">${INTEREST_LABELS[k] || k}</span>`
    ).join('');
    const dt = new Date(r.created_at);
    const dateStr = dt.toLocaleDateString('ko-KR') + '<br>' +
      dt.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
    return `<tr>
      <td style="color:#9CA3AF;">${rows.length - i}</td>
      <td><strong>${esc(r.name)}</strong></td>
      <td>${esc(r.email)}</td>
      <td>${esc(r.phone)}</td>
      <td>${tags || '<span style="color:#D1D5DB;">—</span>'}</td>
      <td><div class="pain-text">${esc(r.pain) || '<span style="color:#D1D5DB;">—</span>'}</div></td>
      <td class="date-text">${dateStr}</td>
    </tr>`;
  }).join('');
}

function esc(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function exportCSV() {
  if (!allData.length) return;
  const headers = ['순번', '이름', '이메일', '전화번호', '관심항목', '불편사항', '신청일시'];
  const rows = allData.map((r, i) => [
    allData.length - i,
    r.name, r.email, r.phone,
    (r.interests || []).map(k => INTEREST_LABELS[k] || k).join(' / '),
    (r.pain || '').replace(/\n/g, ' '),
    new Date(r.created_at).toLocaleString('ko-KR'),
  ]);
  const csv = '﻿' + [headers, ...rows]
    .map(row => row.map(v => `"${String(v).replace(/"/g, '""')}"`).join(','))
    .join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8' }));
  a.download = 'solarpass_signups_' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
}
</script>
</body>
</html>
